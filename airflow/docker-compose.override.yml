services:
  webserver:
    ports:
      - "8081:8080"      # Airflow UI always at http://localhost:8081
    volumes:
      - ../:/usr/local/airflow/project

  scheduler:
    volumes:
      - ../:/usr/local/airflow/project

  triggerer:
    volumes:
      - ../:/usr/local/airflow/project

  postgres:
    ports:
      - "5434:5432"      # Fixed port, avoids conflicts with other postgres instances
